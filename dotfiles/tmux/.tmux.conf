# set terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# set vi mode
set-window-option -g mode-keys vi

# Fix escape key delay
set -sg escape-time 0

# Increase history limit
set -g history-limit 50000

# Increase time to display messages
set -g display-time 2000

# enable focus events
set -g focus-events on

# Enable extended keys for modified key sequences
set -g extended-keys on
set -g extended-keys-format csi-u

# Set the prefix to Control Space
unbind C-b
set -g prefix C-Space

# Alternate to last window (same key as prefix)
bind Space last-window

# Automatically set window names
#set -g automatic-rename on
#set -g automatic-rename-format "#I#{pane_current_command}"

# Create new window
unbind ^C
bind ^C new-window
unbind c
bind c new-window

# Rename window
unbind A
bind A command-prompt "rename-window %%"

# Make first window be 1
set -g base-index 1

# Activity monitoring: highlight window with new messages
setw -g monitor-activity on

set -g detach-on-destroy off

# Splits
unbind %
bind v split-window -h
bind V split-window -v
bind i split-window -h \; send-keys 'eval $CODING_AGENT' Enter

# Pane traversal (vim-style)
bind h select-pane -L
bind j select-pane -D
bind K select-pane -U
bind l select-pane -R

# Window traversal (explicit defaults)
bind n next-window
bind p previous-window

## Status line

# refresh 'status-left' and 'status-right' more often
set -g status-interval 5

set -g status-left-length 32
set -g status-left '[#S]'

# Sessions
bind ( switch-client -p
bind ) switch-client -n
bind L switch-client -l
unbind S
bind S choose-session -N

# Switch sessions with dev
unbind s
bind s run-shell -b "dev tmux switch"

# Send current tab to runner session
bind r run-shell -b "tmux move-window -s $(tmux display-message -p '#S') -t runner"

# Open URLs with dev open-url
unbind u
bind u run-shell -b "dev tmux open-url"

# Open current repository on GitHub
unbind g
bind g run-shell -b "hub browse"

# Push current repository
unbind P
bind P run-shell -b "dev tmux push"

# Send notification after currently running command ends
bind-key M run-shell "kill -s USR1 -- #{pane_pid}"

# Send "commit" message to current pane
bind-key C run-shell -b 'tmux send-keys -l "commit" && sleep 0.05 && tmux send-keys Enter'

# Show keybindings in fzf popup
bind-key ? display-popup -E -w 80% -h 80% "tmux list-keys -Na | fzf --reverse"

# Command launcher
bind-key k run-shell -b "dev tmux launcher"

# Skills search popup
bind-key K run-shell -b "dev tmux skills"

# Ticket manager TUI
unbind t
bind t display-popup -E -w 80% -h 80% "todo tui"



# Open new dev session
unbind N
bind N run-shell -b "dev tmux open"

# Create worktree for current project
unbind w
bind w run-shell -b "dev tmux worktree"

# Remove worktree for current project
unbind W
bind W run-shell -b "dev tmux worktree-remove"

# Review a PR in a new worktree
unbind R
bind R run-shell -b "dev tmux review-pr"

# Kill current session without detaching
unbind X
bind X kill-session

# Pi agent notifications
bind a run-shell -b "dev tmux notify-switch"

# Hooks
set-hook -g after-split-window 'select-layout -E'
set-hook -g pane-exited 'select-layout -E'
set-hook -g after-kill-pane 'select-layout -E'
set-hook -g client-session-changed 'run-shell -b "dev tmux notify-clear"'

# =============================================================================
# Tokyo Night Color Scheme
# =============================================================================

set -g @theme_bg "#1e2030"
set -g @theme_bg_dark "#1b1d2b"
set -g @theme_fg "#82aaff"
set -g @theme_fg_dim "#828bb8"
set -g @theme_border "#3b4261"

# =============================================================================
# Theme Structure
# =============================================================================

# default statusbar colors
set -g status-style "fg=#{@theme_fg},bg=#{@theme_bg}"

# default window title colors
# NOTE: window-status-format and -current-format below contain Powerline glyphs
# (U+E0B0, private-use area). They render invisibly. Edit at byte level
# (sed/cat) to avoid silently dropping them.
setw -g window-status-style "NONE,fg=#{@theme_fg_dim},bg=#{@theme_bg}"
setw -g window-status-format "#[fg=#{@theme_bg},bg=#{@theme_bg},nobold,nounderscore,noitalics]#[default] #I:#W#[fg=#{@theme_bg},bg=#{@theme_bg},nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#{@theme_bg},bg=#{@theme_border},nobold,nounderscore,noitalics]#[fg=#{@theme_fg},bg=#{@theme_border}] #I:#W#[fg=#{@theme_border},bg=#{@theme_bg},nobold,nounderscore,noitalics]"
setw -g window-status-activity-style "fg=#{@theme_fg_dim},bg=#{@theme_bg}"

# pane border
set -g pane-border-style "fg=#{@theme_border}"
set -g pane-active-border-style "fg=#{@theme_fg}"

# message text
set -g message-style "fg=#{@theme_fg},bg=#{@theme_border}"
set -g message-command-style "fg=#{@theme_fg},bg=#{@theme_border}"

# pane number display
#set-option -g display-panes-active-colour blue
#set-option -g display-panes-colour brightred

# other stuff
set -g mode-style "fg=#{@theme_fg},bg=#{@theme_border}"
setw -g window-status-separator ""

# NOTE: status-left and status-right below contain Powerline glyphs
# (U+E0B0/U+E0B2, private-use area). They render invisibly. Edit at byte level
# (sed/cat) to avoid silently dropping them.
set -g status-left "#[fg=#{@theme_bg_dark},bg=#{@theme_fg},bold] #S #[fg=#{@theme_fg},bg=#{@theme_bg},nobold,nounderscore,noitalics]"
set -g status-right-length 75
set -g status-right "#[fg=#{@theme_fg},bold]#{?window_zoomed_flag, ⛶ ,}#[fg=yellow,bold]#{?#{@pi_notifications}, ● ,}#[fg=#{@theme_border},bg=#{@theme_bg},nobold,nounderscore,noitalics]#[fg=#{@theme_fg},bg=#{@theme_border}] #(gitmux -cfg ~/.gitmux.conf '#{pane_current_path}')#[fg=#{@theme_bg},bg=#{@theme_border},nobold,nounderscore,noitalics]#[fg=#{@theme_fg},bg=#{@theme_bg},nobold,nounderscore,noitalics]#[fg=#{@theme_bg_dark},bg=#{@theme_fg},bold] #(dev notes tracking) "
